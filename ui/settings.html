<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>DiligentHours 설정</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="settings-body">
  <main>
    <h1>DiligentHours 설정</h1>

    <fieldset>
      <legend>근무시간</legend>
      <div class="row">
        <label>
          <input type="number" id="hours" min="0" max="24" step="1" /> 시간
        </label>
        <label>
          <input type="number" id="minutes" min="0" max="59" step="1" /> 분
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>표시</legend>
      <div class="row">
        <span>표시 형식:</span>
        <label><input type="radio" name="displayFormat" id="fmt-hms" value="hms" /> 시:분:초</label>
        <label><input type="radio" name="displayFormat" id="fmt-seconds" value="seconds" /> 초 단위</label>
      </div>
      <div class="row">
        <label><input type="checkbox" id="showFloating" /> 플로팅 창 표시</label>
      </div>
      <div class="row">
        <span>플로팅 투명도</span>
        <input type="range" id="opacity" min="0.15" max="1.0" step="0.05" />
        <span class="range-value" id="opacity-value">0.85</span>
      </div>
      <div class="row">
        <span>글자 크기</span>
        <input type="range" id="fontSize" min="16" max="64" step="1" />
        <span class="range-value" id="fontSize-value">30px</span>
      </div>
    </fieldset>

    <fieldset>
      <legend>동작</legend>
      <div class="row">
        <label><input type="checkbox" id="includeMouseMove" /> 마우스 이동도 시작 트리거로 인정</label>
      </div>
      <div class="row">
        <label><input type="checkbox" id="notifyToast" /> 종료 시 토스트 알림</label>
      </div>
      <div class="row">
        <label><input type="checkbox" id="notifySound" /> 종료 시 사운드</label>
      </div>
      <div class="row">
        <label><input type="checkbox" id="autostart" /> Windows 시작 시 자동 실행</label>
      </div>
    </fieldset>

    <div class="actions">
      <button id="save" class="primary" type="button">저장</button>
      <span id="save-feedback">저장됨</span>
    </div>

    <fieldset style="margin-top: 12px;">
      <legend>수동 제어</legend>
      <div class="row">
        <button id="manual-start" type="button">지금 시작</button>
        <button id="manual-reset" type="button">오늘 리셋</button>
      </div>
    </fieldset>

    <p class="privacy-note">
      입력 내용은 절대 기록되지 않으며, 네트워크 통신을 하지 않습니다.<br />
      (입력 발생 "시각"만 사용하여 근무 시작을 감지합니다.)
    </p>
  </main>
  <script src="settings.js"></script>
</body>
</html>
